name: Validate Doc Links

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-doc-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            "./**/*.md"
            "./README.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
